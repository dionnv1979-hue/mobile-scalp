<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BYBIT MOBILE SCALP ⚡</title>

<style>
body{
  margin:0;
  background:#020617;
  color:#e5e7eb;
  font-family:Arial;
  text-align:center;
  padding:20px;
}

.good{color:#4ade80}
.bad{color:#f87171}
.warn{color:#facc15}

.price{
  font-size:46px;
  font-weight:bold;
  margin:20px 0;
}

.panel{
  background:#0f172a;
  padding:18px;
  border-radius:14px;
  margin-top:20px;
  font-size:20px;
}
</style>
</head>

<body>

<h1>⚡ BYBIT SCALP TERMINAL 15m</h1>

<div class="price" id="price">CONNECT...</div>

<div class="panel">
Signal: <span id="signal" class="warn">WAIT</span><br><br>
Trend: <span id="trend">—</span><br>
Volatility: <span id="vol">—</span>
</div>

<script>
const priceEl = document.getElementById("price");
const signalEl = document.getElementById("signal");
const trendEl = document.getElementById("trend");
const volEl = document.getElementById("vol");

let prices = [];

const ws = new WebSocket("wss://stream.bybit.com/v5/public/linear");

ws.onopen = () => {
  ws.send(JSON.stringify({
    op: "subscribe",
    args: ["tickers.BTCUSDT"]
  }));
};

ws.onmessage = (msg) => {
  const data = JSON.parse(msg.data);

  if(data.topic === "tickers.BTCUSDT"){
    const p = parseFloat(data.data.lastPrice);
    priceEl.textContent = p.toFixed(2);

    prices.push(p);
    if(prices.length > 60) prices.shift();

    analyze();
  }
};

function analyze(){

  if(prices.length < 30){
    signalEl.textContent = "WAIT";
    signalEl.className = "warn";
    return;
  }

  const recent = prices.slice(-10);
  const old = prices.slice(-30, -20);

  const avgRecent = avg(recent);
  const avgOld = avg(old);

  const change = (avgRecent - avgOld) / avgOld * 100;

  const vol = Math.abs(change).toFixed(2);
  volEl.textContent = vol + "%";

  if(change > 0.25){
    trendEl.textContent = "UP";
    trendEl.className = "good";
    signalEl.textContent = "LONG";
    signalEl.className = "good";
  }
  else if(change < -0.25){
    trendEl.textContent = "DOWN";
    trendEl.className = "bad";
    signalEl.textContent = "SHORT";
    signalEl.className = "bad";
  }
  else{
    trendEl.textContent = "SIDE";
    trendEl.className = "warn";
    signalEl.textContent = "WAIT";
    signalEl.className = "warn";
  }
}

function avg(arr){
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}
</script>

</body>
</html>
