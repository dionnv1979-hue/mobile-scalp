<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>💼 BYBIT HEDGE SCALP TERMINAL</title>

<style>
body{
  margin:0;
  background:#020617;
  color:#e5e7eb;
  font-family:Arial;
  text-align:center;
  padding:40px 20px;
}

.price{
  font-size:64px;
  font-weight:bold;
  margin:20px 0;
}

.box{
  background:#0f172a;
  padding:25px;
  border-radius:20px;
  margin-top:20px;
  font-size:20px;
}

.long{color:#4ade80;font-weight:bold}
.short{color:#f87171;font-weight:bold}
.wait{color:#facc15;font-weight:bold}
</style>
</head>

<body>

<h1>💼 BYBIT HEDGE SCALP TERMINAL</h1>

<div id="price" class="price">LOADING</div>

<div class="box">
  Signal: <b id="signal" class="wait">WAIT</b><br><br>
  Trend: <b id="trend">SIDE</b><br>
  Volatility: <b id="vol">--</b><br>
  Strength: <b id="prob">--</b><br>
  Risk: <b id="risk">--</b><br><br>
  TP: <b id="tp">--</b><br>
  SL: <b id="sl">--</b><br>
  RR: <b id="rr">--</b>
</div>

<script>
let closes = [];
let lastPrice = 0;

//
// 🔥 ЖИВАЯ ЦЕНА (каждые 3 сек)
//
async function loadPrice(){

  try{
    const r = await fetch(
      "https://api.bybit.com/v5/market/tickers?category=linear&symbol=BTCUSDT",
      {cache:"no-store"}
    );

    const data = await r.json();
    const p = parseFloat(data.result.list[0].lastPrice);

    if(!isNaN(p) && p > 0){
      lastPrice = p;
      document.getElementById("price").textContent = p.toFixed(2);
    }

  }catch(e){
    console.log("Price API fail");
  }
}

//
// 🔥 РЕАЛЬНЫЕ СВЕЧИ 15m
//
async function loadKlines(){

  try{
    const r = await fetch(
      "https://api.bybit.com/v5/market/kline?category=linear&symbol=BTCUSDT&interval=15&limit=300"
    );

    const data = await r.json();
    const list = data.result.list.reverse();

    closes = list.map(c => parseFloat(c[4]));

    analyze();

  }catch(e){
    console.log("Kline API fail");
  }
}

//
// 🔥 EMA
//
function EMA(period){
  let k = 2/(period+1);
  let ema = closes[0];

  for(let i=1;i<closes.length;i++){
    ema = closes[i]*k + ema*(1-k);
  }
  return ema;
}

//
// 🔥 АНАЛИЗ
//
function analyze(){

  if(closes.length < 210) return;

  const price = lastPrice || closes.at(-1);

  const e20 = EMA(20);
  const e50 = EMA(50);
  const e200 = EMA(200);

  const momentum = price - closes.at(-5);

  const recent = closes.slice(-30);
  const max = Math.max(...recent);
  const min = Math.min(...recent);

  const volatility = ((max-min)/min*100);

  document.getElementById("vol").textContent =
    volatility.toFixed(2)+"%";

  let trend="SIDE";
  let signal="WAIT";
  let cls="wait";
  let tp="--", sl="--", rr="--";
  let risk="MEDIUM";

  const majorUp = price > e200;

  const trendStrength =
    Math.abs(e20-e50)/price*100;

  const momentumStrength =
    Math.abs(momentum)/price*100;

  let prob =
    trendStrength*200 +
    momentumStrength*400 +
    volatility*10;

  prob = Math.min(95, Math.round(prob));

  // 🔥 LONG
  if(e20>e50 && momentum>0 && volatility>0.25 && majorUp){

    trend="UP";
    signal="LONG";
    cls="long";

    const tpVal = price * 1.004;
    const slVal = price * 0.997;

    tp = tpVal.toFixed(2);
    sl = slVal.toFixed(2);

    rr = ((tpVal-price)/(price-slVal)).toFixed(2);
  }

  // 🔥 SHORT
  else if(e20<e50 && momentum<0 && volatility>0.25 && !majorUp){

    trend="DOWN";
    signal="SHORT";
    cls="short";

    const tpVal = price * 0.996;
    const slVal = price * 1.003;

    tp = tpVal.toFixed(2);
    sl = slVal.toFixed(2);

    rr = ((price-tpVal)/(slVal-price)).toFixed(2);
  }

  if(volatility > 0.8) risk="HIGH";
  else if(volatility < 0.3) risk="LOW";

  document.getElementById("trend").textContent = trend;
  document.getElementById("prob").textContent = prob+"%";
  document.getElementById("risk").textContent = risk;
  document.getElementById("tp").textContent = tp;
  document.getElementById("sl").textContent = sl;
  document.getElementById("rr").textContent = rr;

  const s = document.getElementById("signal");
  s.textContent = signal;
  s.className = cls;
}

//
// 🔥 СТАРТ
//
loadPrice();
loadKlines();

// живая цена
setInterval(loadPrice, 3000);

// обновление свечей
setInterval(loadKlines, 60000);

</script>

</body>
</html>
