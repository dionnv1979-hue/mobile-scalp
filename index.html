<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>⚡ BYBIT SCALP TERMINAL 15m</title>

<style>
body{
  margin:0;
  background:#020617;
  color:#e5e7eb;
  font-family:Arial;
  text-align:center;
  padding:40px 20px;
}

.price{
  font-size:64px;
  font-weight:bold;
  margin:20px 0;
}

.box{
  background:#0f172a;
  padding:25px;
  border-radius:20px;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>⚡ BYBIT SCALP TERMINAL 15m</h1>

<div id="price" class="price">WAIT</div>

<div class="box">
  Signal: <b id="signal">WAIT</b><br><br>
  Trend: <b id="trend">SIDE</b><br>
  Volatility: <b id="vol">--</b>
</div>

<script>
let lastPrice = 0;

async function updatePrice(){

  try{
    const r = await fetch(
      "https://api.bybit.com/v5/market/tickers?category=linear&symbol=BTCUSDT"
    );

    const data = await r.json();

    const p = parseFloat(data.result.list[0].lastPrice);

    // 🔥 ЗАЩИТА ОТ NaN
    if(!isNaN(p) && p > 0){
      lastPrice = p;
    }

    document.getElementById("price").textContent =
      lastPrice ? lastPrice.toFixed(2) : "WAIT";

  }catch(e){
    console.log("API error — using last price");
  }

}

// старт сразу
updatePrice();

// обновление каждые 2 сек
setInterval(updatePrice, 2000);
</script>

</body>
</html>
